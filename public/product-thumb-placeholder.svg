<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="0"/>

  <!-- Phone body -->
  <rect x="65" y="38" width="70" height="124" rx="10" fill="#2563eb"/>

  <!-- Phone screen -->
  <rect x="70" y="46" width="60" height="108" rx="3" fill="white" fill-opacity="0.15"/>

  <!-- Camera -->
  <rect x="85" y="41" width="30" height="4" rx="2" fill="black" fill-opacity="0.3"/>

  <!-- Screen lines -->
  <rect x="76" y="56" width="48" height="4" rx="2" fill="white" fill-opacity="0.25"/>
  <rect x="76" y="65" width="36" height="4" rx="2" fill="white" fill-opacity="0.15"/>
  <rect x="76" y="76" width="48" height="20" rx="3" fill="white" fill-opacity="0.1"/>

  <!-- Home button -->
  <circle cx="100" y="160" r="4" fill="white" fill-opacity="0.2"/>

  <!-- Bottom color bar -->
  <rect x="0" y="184" width="200" height="16" fill="url(#bar)"/>
</svg>
